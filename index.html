<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 台股投資分析報告</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:0}
.hero{background:linear-gradient(135deg,#0d1424 0%,#1a1040 100%);border-bottom:1px solid #2e1065;padding:40px 24px 32px}
.hero-inner{max-width:780px;margin:0 auto}
.hero-flag{font-size:36px;margin-bottom:10px}
h1{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 span{color:#a78bfa}
.hero-sub{color:#64748b;font-size:13px;margin-bottom:20px}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap}
.stat{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:10px 18px;font-size:12px}
.stat-num{font-size:20px;font-weight:700;color:#a78bfa;display:block}
.stat-label{color:#64748b;margin-top:1px}
.main{max-width:780px;margin:0 auto;padding:32px 24px}
.section-title{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.report-item{background:#111827;border:1px solid #1e2d45;border-radius:14px;padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .15s;cursor:pointer}
.report-item:hover{border-color:#7c3aed;transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.1)}
.report-left{}
.report-date{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;padding:2px 9px;border-radius:8px;font-weight:600}
.badge-day{background:#2e1065;color:#a78bfa}
.badge-new{background:rgba(52,211,153,.12);color:#34d399}
.report-sub{font-size:12px;color:#64748b;margin-top:4px}
.open-btn{background:#7c3aed;color:#fff;border:none;padding:9px 20px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block;transition:background .15s;flex-shrink:0}
.open-btn:hover{background:#6d28d9}
.loading{color:#64748b;text-align:center;padding:60px;font-size:13px}
.empty{color:#64748b;text-align:center;padding:60px}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;margin-bottom:6px}
.empty-sub{font-size:12px;color:#475569}
.footer{border-top:1px solid #1e2d45;padding:28px 24px;max-width:780px;margin:0 auto}
.footer-text{font-size:11px;color:#475569;line-height:1.8;text-align:center}
.links{display:flex;gap:16px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.link-btn{font-size:12px;color:#7c3aed;text-decoration:none;padding:4px 0;border-bottom:1px solid transparent;transition:border-color .15s}
.link-btn:hover{border-bottom-color:#7c3aed}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-flag">🇹🇼</div>
    <h1>台股 <span>投資分析</span> 報告</h1>
    <div class="hero-sub">每週三、週五下午 5:00 自動更新 · AI 驅動選股 · 動態分析師評級</div>
    <div class="hero-stats">
      <div class="stat"><span class="stat-num" id="report-count">—</span><div class="stat-label">份報告</div></div>
      <div class="stat"><span class="stat-num" id="latest-date">—</span><div class="stat-label">最新更新</div></div>
      <div class="stat"><span class="stat-num">10–12</span><div class="stat-label">每報告精選個股</div></div>
    </div>
  </div>
</div>
<div class="main">
  <div class="section-title">📋 報告列表</div>
  <div id="list"><div class="loading">⏳ 載入報告清單中...</div></div>
</div>
<div class="footer">
  <div class="links">
    <a class="link-btn" href="https://github.com/yuming0827/taiwan-stock-report" target="_blank">GitHub Repo</a>
    <a class="link-btn" href="https://yuming0827.github.io/us-stock-reports/" target="_blank">🇺🇸 美股報告</a>
  </div>
  <div class="footer-text">
    ⚠️ 免責聲明：本頁所有報告僅供參考，不構成任何投資建議。<br>
    股市投資具有風險，過去績效不代表未來表現，請自行判斷並諮詢專業財務顧問。<br>
    資料來源：Yahoo Finance、MarketBeat、台灣法人公開報告、分析師預測
  </div>
</div>
<script>
(async () => {
  const REPO = "yuming0827/taiwan-stock-report";
  const BASE = "https://yuming0827.github.io/taiwan-stock-report";
  const container = document.getElementById("list");
  try {
    const res = await fetch("https://api.github.com/repos/" + REPO + "/contents/");
    const files = await res.json();
    const reports = files
      .filter(f => f.name.startsWith("投資報告_") && f.name.endsWith(".html") && f.size > 10000)
      .sort((a, b) => b.name.localeCompare(a.name));
    document.getElementById("report-count").textContent = reports.length;
    if (!reports.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">尚無報告</div><div class="empty-sub">下次排程（週三/週五 17:00）執行後即可看到</div></div>';
      return;
    }
    document.getElementById("latest-date").textContent = reports[0].name.replace("投資報告_","").replace(".html","");
    container.innerHTML = reports.map((f, idx) => {
      const date = f.name.replace("投資報告_","").replace(".html","");
      const [y, m, d] = date.split("-");
      const weekday = ["日","一","二","三","四","五","六"][new Date(date).getDay()];
      const isNew = idx === 0;
      const kb = (f.size / 1024).toFixed(0);
      return `<div class="report-item" onclick="window.open('${BASE}/${f.name}','_blank')">
        <div class="report-left">
          <div class="report-date">
            📄 ${y} 年 ${m} 月 ${d} 日
            <span class="badge badge-day">週${weekday}</span>
            ${isNew ? '<span class="badge badge-new">最新</span>' : ''}
          </div>
          <div class="report-sub">台股精選 · 10–12 檔 · 7 個互動分頁 · ${kb}KB</div>
        </div>
        <a class="open-btn" href="${BASE}/${f.name}" target="_blank" onclick="event.stopPropagation()">開啟報告 →</a>
      </div>`;
    }).join("");
  } catch(e) {
    container.innerHTML = '<div class="loading">載入失敗，請重新整理頁面</div>';
  }
})();
</script>
</body>
</html>
